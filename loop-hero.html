<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rig-Guard · Hero · Brand loop</title>
<link rel="stylesheet" href="tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-hi);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100%; height: 100%;
    background:
      radial-gradient(ellipse 80% 60% at 50% 60%, rgba(46,111,232,0.08), transparent 70%),
      var(--bg-deep);
    overflow: hidden;
  }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  .hud { position: absolute; inset: 0; pointer-events: none; }

  /* Caption pill — top center */
  .caption-pill {
    position: absolute; left: 50%; top: 36px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    background: rgba(11, 26, 58, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-mid);
    animation: pillFadeIn 1200ms var(--ease) both;
  }
  .caption-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan-400);
    box-shadow: 0 0 12px var(--cyan-400);
    animation: dotPulse 2.4s ease-in-out infinite;
  }
  @keyframes pillFadeIn {
    from { opacity: 0; transform: translate(-50%, -12px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 6px var(--cyan-400); opacity: 0.7; }
    50%      { box-shadow: 0 0 18px var(--cyan-400); opacity: 1; }
  }

  /* Hero title — left side, animated reveal looping with the 7s scene */
  .hero-title {
    position: absolute; left: clamp(28px, 5vw, 64px); top: 50%;
    transform: translateY(-50%);
    max-width: 460px;
  }
  .hero-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--cyan-400);
    margin-bottom: 18px;
    opacity: 0;
    animation: heroEyebrow 900ms var(--ease) 200ms forwards;
  }
  .hero-h {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 700; line-height: 0.96;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, #CDD4E4 60%, #4FE0D2 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }
  .hero-h .line {
    display: block;
    overflow: hidden;
  }
  .hero-h .line span {
    display: inline-block;
    transform: translateY(110%);
    animation: heroLine 900ms var(--ease) forwards;
  }
  .hero-h .line:nth-child(1) span { animation-delay: 600ms; }
  .hero-h .line:nth-child(2) span { animation-delay: 800ms; }

  .hero-tag {
    margin-top: 18px;
    font-size: 15px; color: var(--text-mid); line-height: 1.55;
    max-width: 460px;
    opacity: 0;
    animation: heroTag 900ms var(--ease) 1400ms forwards;
  }

  @keyframes heroEyebrow {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes heroLine {
    from { transform: translateY(110%); }
    to   { transform: translateY(0); }
  }
  @keyframes heroTag {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Decorative corner ticks */
  .corner {
    position: absolute; width: 64px; height: 64px;
    border-color: var(--line); border-style: solid; border-width: 0;
    opacity: 0.6;
  }
  .corner.tl { top: 24px; left: 24px; border-top-width: 1px; border-left-width: 1px; }
  .corner.tr { top: 24px; right: 24px; border-top-width: 1px; border-right-width: 1px; }
  .corner.bl { bottom: 24px; left: 24px; border-bottom-width: 1px; border-left-width: 1px; }
  .corner.br { bottom: 24px; right: 24px; border-bottom-width: 1px; border-right-width: 1px; }
</style>
</head>
<body data-scene="hero">
  <div id="stage">
    <canvas id="canvas"></canvas>

    <div class="hud">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="caption-pill">
        <span class="dot"></span>
        <span>Rig-Guard · always on</span>
      </div>

      <div class="hero-title">
        <div class="hero-eyebrow">Autonomous EAM · SAP BDC</div>
        <h1 class="hero-h">
          <span class="line"><span>The rig that</span></span>
          <span class="line"><span>watches itself.</span></span>
        </h1>
        <p class="hero-tag">A closed-loop maintenance agent that predicts, contextualizes, and executes — eliminating the 48-hour insight-to-action gap.</p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="rig.js"></script>
  <script src="scenes.js"></script>
  <script src="loop-player.js"></script>
</body>
</html>
