<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rig-Guard · Mode B · Fully Autonomous</title>
<link rel="stylesheet" href="tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-hi);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #stage {
    position: relative; width: 100%; height: 100%;
    background:
      radial-gradient(ellipse 80% 60% at 50% 60%, rgba(63,200,228,0.10), transparent 70%),
      var(--bg-deep);
    overflow: hidden;
  }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .hud { position: absolute; inset: 0; pointer-events: none; }

  .caption-pill {
    position: absolute; left: 50%; top: 36px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    background: rgba(11,26,58,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-mid);
    animation: pillFadeIn 1200ms var(--ease) both;
  }
  .caption-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan-400);
    box-shadow: 0 0 12px var(--cyan-400);
    animation: cyanPulse 1.6s ease-in-out infinite;
  }
  @keyframes pillFadeIn {
    from { opacity: 0; transform: translate(-50%, -12px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes cyanPulse {
    0%, 100% { box-shadow: 0 0 6px var(--cyan-400); opacity: 0.8; }
    50%      { box-shadow: 0 0 22px var(--cyan-400); opacity: 1; }
  }

  /* Storyline — left side */
  .story {
    position: absolute; left: clamp(28px, 5vw, 64px); top: 50%;
    transform: translateY(-50%);
    max-width: 480px;
  }
  .story-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--cyan-400);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
    opacity: 0;
    animation: stEyebrow 4.5s var(--ease) infinite;
  }
  .story-eyebrow .lite {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; box-shadow: 0 0 8px currentColor;
  }
  .story-h {
    font-size: clamp(30px, 4.2vw, 52px);
    font-weight: 700; line-height: 1.0;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, #CDD4E4 60%, var(--cyan-400) 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent; -webkit-text-fill-color: transparent;
  }
  .story-h .line { display: block; overflow: hidden; }
  .story-h .line span {
    display: inline-block; transform: translateY(110%);
    animation: stLine 4.5s var(--ease) infinite;
  }
  .story-h .line:nth-child(1) span { animation-delay: 0.05s; }
  .story-h .line:nth-child(2) span { animation-delay: 0.18s; }

  /* Step list — Predict → Context → Expose → Propose → Execute */
  .steps {
    margin-top: 22px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .step {
    display: flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--text-lo);
    letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0; transform: translateX(-8px);
    animation-duration: 4.5s;
    animation-timing-function: var(--ease);
    animation-iteration-count: infinite;
  }
  .step .num {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid var(--line);
    background: rgba(15,28,68,0.7);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-mid);
    flex: 0 0 24px;
    transition: all 200ms var(--ease);
  }
  .step.active .num {
    border-color: var(--cyan-400);
    color: var(--text-hi);
    box-shadow: 0 0 0 3px rgba(63,200,228,0.18), 0 0 16px var(--cyan-400);
    background: var(--bg-elev-3);
  }
  .step:nth-child(1) { animation-name: step1; }
  .step:nth-child(2) { animation-name: step2; }
  .step:nth-child(3) { animation-name: step3; }
  .step:nth-child(4) { animation-name: step4; }
  .step:nth-child(5) { animation-name: step5; }

  @keyframes stEyebrow {
    0%   { opacity: 0; transform: translateY(8px); }
    6%   { opacity: 1; transform: translateY(0); }
    82%  { opacity: 1; }
    94%, 100% { opacity: 0; transform: translateY(-4px); }
  }
  @keyframes stLine {
    0%   { transform: translateY(110%); }
    14%  { transform: translateY(0); }
    82%  { transform: translateY(0); }
    94%, 100% { transform: translateY(-110%); }
  }
  /* steps reveal sequentially during the loop */
  @keyframes step1 {
    0%, 18%   { opacity: 0; transform: translateX(-8px); color: var(--text-lo); }
    24%       { opacity: 1; transform: translateX(0); color: var(--text-hi); }
    82%       { opacity: 1; color: var(--text-hi); }
    94%, 100% { opacity: 0; }
  }
  @keyframes step2 {
    0%, 28%   { opacity: 0; transform: translateX(-8px); color: var(--text-lo); }
    34%       { opacity: 1; transform: translateX(0); color: var(--text-hi); }
    82%       { opacity: 1; color: var(--text-hi); }
    94%, 100% { opacity: 0; }
  }
  @keyframes step3 {
    0%, 38%   { opacity: 0; transform: translateX(-8px); color: var(--text-lo); }
    44%       { opacity: 1; transform: translateX(0); color: var(--text-hi); }
    82%       { opacity: 1; color: var(--text-hi); }
    94%, 100% { opacity: 0; }
  }
  @keyframes step4 {
    0%, 48%   { opacity: 0; transform: translateX(-8px); color: var(--text-lo); }
    54%       { opacity: 1; transform: translateX(0); color: var(--text-hi); }
    82%       { opacity: 1; color: var(--text-hi); }
    94%, 100% { opacity: 0; }
  }
  @keyframes step5 {
    0%, 58%   { opacity: 0; transform: translateX(-8px); color: var(--text-lo); }
    64%       { opacity: 1; transform: translateX(0); color: var(--text-hi); }
    82%       { opacity: 1; color: var(--text-hi); }
    94%, 100% { opacity: 0; }
  }

  /* Result chip — bottom of story */
  .resolve {
    margin-top: 20px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(46,111,232,0.18), rgba(63,200,228,0.18));
    border: 1px solid rgba(63,200,228,0.5);
    color: var(--cyan-400);
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    opacity: 0;
    animation: stResolve 4.5s var(--ease) infinite;
  }
  .resolve .check {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--grad);
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 9px; font-weight: 700;
  }
  @keyframes stResolve {
    0%, 70%   { opacity: 0; transform: translateY(8px) scale(0.96); }
    78%       { opacity: 1; transform: translateY(0) scale(1.04); }
    84%       { opacity: 1; transform: translateY(0) scale(1); }
    94%, 100% { opacity: 0; }
  }

  /* Confidence chip — top right */
  .conf-chip {
    position: absolute; right: clamp(28px, 4vw, 56px); top: 96px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: rgba(11,26,58,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(63,200,228,0.4);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--cyan-400);
    animation: chipFade 4.5s var(--ease) infinite;
  }
  .conf-chip .lite {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--cyan-400); box-shadow: 0 0 8px var(--cyan-400);
  }
  @keyframes chipFade {
    0%   { opacity: 0; transform: translateX(8px); }
    10%  { opacity: 1; transform: translateX(0); }
    82%  { opacity: 1; }
    94%, 100% { opacity: 0; }
  }

  .corner {
    position: absolute; width: 64px; height: 64px;
    border-color: var(--line); border-style: solid; border-width: 0;
    opacity: 0.6;
  }
  .corner.tl { top: 24px; left: 24px; border-top-width: 1px; border-left-width: 1px; }
  .corner.tr { top: 24px; right: 24px; border-top-width: 1px; border-right-width: 1px; }
  .corner.bl { bottom: 24px; left: 24px; border-bottom-width: 1px; border-left-width: 1px; }
  .corner.br { bottom: 24px; right: 24px; border-bottom-width: 1px; border-right-width: 1px; }
</style>
</head>
<body data-scene="autonomous">
  <div id="stage">
    <canvas id="canvas"></canvas>

    <div class="hud">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="caption-pill">
        <span class="dot"></span>
        <span>Mode B · Fully Autonomous · ≥95%</span>
      </div>

      <div class="conf-chip">
        <span class="lite"></span>
        <span>Confidence 96% · cyan</span>
      </div>

      <div class="story">
        <div class="story-eyebrow"><span class="lite"></span>Closed-loop · No Human-in-the-Loop</div>
        <h1 class="story-h">
          <span class="line"><span>Predict.</span></span>
          <span class="line"><span>Decide. Execute.</span></span>
        </h1>

        <div class="steps">
          <div class="step active"><span class="num">01</span> Predict · sensor anomaly</div>
          <div class="step active"><span class="num">02</span> Context · BDC + S/4</div>
          <div class="step active"><span class="num">03</span> Expose · digital twin</div>
          <div class="step active"><span class="num">04</span> Propose · WO PM01</div>
          <div class="step active"><span class="num">05</span> Execute · auto-dispatch</div>
        </div>

        <div class="resolve">
          <span class="check">✓</span>
          WO PM01 executed · 30-min cancel window
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="rig.js"></script>
  <script src="scenes.js"></script>
  <script src="loop-player.js"></script>
</body>
</html>
