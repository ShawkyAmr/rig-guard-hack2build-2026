<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rig-Guard · Watch mode</title>
<link rel="stylesheet" href="tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-hi);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #stage {
    position: relative; width: 100%; height: 100%;
    background:
      radial-gradient(ellipse 80% 60% at 50% 60%, rgba(123,140,174,0.06), transparent 70%),
      var(--bg-deep);
    overflow: hidden;
  }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .hud { position: absolute; inset: 0; pointer-events: none; }

  .corner {
    position: absolute; width: 64px; height: 64px;
    border-color: var(--line); border-style: solid; border-width: 0;
    opacity: 0.5;
  }
  .corner.tl { top: 24px; left: 24px; border-top-width: 1px; border-left-width: 1px; }
  .corner.tr { top: 24px; right: 24px; border-top-width: 1px; border-right-width: 1px; }
  .corner.bl { bottom: 24px; left: 24px; border-bottom-width: 1px; border-left-width: 1px; }
  .corner.br { bottom: 24px; right: 24px; border-bottom-width: 1px; border-right-width: 1px; }
</style>
</head>
<body data-scene="watch">
  <div id="stage">
    <canvas id="canvas"></canvas>

    <div class="hud">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="rig.js"></script>
  <script src="scenes.js"></script>
  <script src="loop-player.js"></script>
</body>
</html>
